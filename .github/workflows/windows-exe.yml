name: Windows EXE

# Manually build ONLY a Windows .exe (no other platforms / installers).
# Run it from the Actions tab and choose which kind of exe to produce.
on:
  workflow_dispatch:
    inputs:
      kind:
        description: "Which Windows .exe to build"
        type: choice
        default: installer
        options:
          - installer # NSIS setup .exe
          - portable # single self-contained .exe (no installer)

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build installer (.exe)
        if: ${{ inputs.kind == 'installer' }}
        run: cargo tauri build --bundles nsis

      - name: Build portable (.exe)
        if: ${{ inputs.kind == 'portable' }}
        run: cargo tauri build --no-bundle

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: just-text-windows-${{ inputs.kind }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/just-text.exe
