<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just Text</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Toolbar (Material Design Icons) -->
      <header class="toolbar">
        <button id="btn-new" title="New tab (Ctrl+N)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M13.81 22H6C4.89 22 4 21.11 4 20V4C4 2.9 4.89 2 6 2H14L20 8V13.09C19.67 13.04 19.34 13 19 13S18.33 13.04 18 13.09V9H13V4H6V20H13.09C13.21 20.72 13.46 21.39 13.81 22M23 18H20V15H18V18H15V20H18V23H20V20H23V18Z"/></svg>
          <span>New</span>
        </button>
        <button id="btn-open" title="Open file (Ctrl+O)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M6.1,10L4,18V8H21A2,2 0 0,0 19,6H12L10,4H4A2,2 0 0,0 2,6V18A2,2 0 0,0 4,20H19C19.9,20 20.7,19.4 20.9,18.5L23.2,10H6.1M19,18H6L7.6,12H20.6L19,18Z"/></svg>
          <span>Open</span>
        </button>
        <button id="btn-save" title="Save (Ctrl+S)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M17 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V7L17 3M19 19H5V5H16.17L19 7.83V19M12 12C10.34 12 9 13.34 9 15S10.34 18 12 18 15 16.66 15 15 13.66 12 12 12M6 6H15V10H6V6Z"/></svg>
          <span>Save</span>
        </button>
        <button id="btn-saveas" title="Save As (Ctrl+Shift+S)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 19H10V21H4C2.89 21 2 20.1 2 19V5C2 3.9 2.89 3 4 3H16L20 7V9.12L18 11.12V7.83L15.17 5H4V19M14 10V6H5V10H14M20.42 12.3C20.31 12.19 20.18 12.13 20.04 12.13C19.9 12.13 19.76 12.19 19.65 12.3L18.65 13.3L20.7 15.35L21.7 14.35C21.92 14.14 21.92 13.79 21.7 13.58L20.42 12.3M12 19.94V22H14.06L20.12 15.93L18.07 13.88L12 19.94M14 15C14 13.34 12.66 12 11 12S8 13.34 8 15 9.34 18 11 18C11.04 18 11.08 18 11.13 18L14 15.13C14 15.09 14 15.05 14 15"/></svg>
          <span>Save As</span>
        </button>
        <span class="sep"></span>
        <button id="btn-find" title="Find &amp; Replace (Ctrl+F)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
          <span>Find</span>
        </button>

        <div class="menu">
          <button id="btn-lines" title="Line operations">
            <svg class="icon" viewBox="0 0 24 24"><path d="M18 21L14 17H17V7H14L18 3L22 7H19V17H22M2 19V17H12V19M2 13V11H9V13M2 7V5H6V7H2Z"/></svg>
            <span>Lines</span>
            <svg class="icon chevron" viewBox="0 0 24 24"><path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/></svg>
          </button>
          <div class="menu-list" id="lines-menu">
            <button data-op="sort-asc">Sort Ascending</button>
            <button data-op="sort-desc">Sort Descending</button>
            <button data-op="sort-ci">Sort (case-insensitive)</button>
            <hr />
            <button data-op="dedup">Remove Duplicates</button>
            <button data-op="rm-empty">Remove Empty Lines</button>
            <button data-op="trim">Trim Trailing Whitespace</button>
            <hr />
            <button data-op="keep-starts">Keep Lines Starting With…</button>
            <button data-op="rm-starts">Remove Lines Starting With…</button>
            <button data-op="keep-ends">Keep Lines Ending With…</button>
            <button data-op="rm-ends">Remove Lines Ending With…</button>
            <button data-op="keep-has">Keep Lines Containing…</button>
            <button data-op="rm-has">Remove Lines Containing…</button>
          </div>
        </div>

        <span class="spacer"></span>
        <button id="btn-copyall" title="Copy all to clipboard (Ctrl+Shift+C)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"/></svg>
          <span>Copy All</span>
        </button>
        <button id="btn-theme" class="icon-only" title="Toggle theme (Ctrl+T)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M7.5,2C5.71,3.15 4.5,5.18 4.5,7.5C4.5,9.82 5.71,11.85 7.53,13C4.46,13 2,10.54 2,7.5A5.5,5.5 0 0,1 7.5,2M19.07,3.5L20.5,4.93L4.93,20.5L3.5,19.07L19.07,3.5M12.89,5.93L11.41,5L9.97,6L10.39,4.3L9,3.24L10.75,3.12L11.33,1.47L12,3.1L13.73,3.13L12.38,4.26L12.89,5.93M9.59,9.54L8.43,8.81L7.31,9.59L7.65,8.27L6.56,7.44L7.92,7.35L8.37,6.06L8.88,7.33L10.24,7.36L9.19,8.23L9.59,9.54M19,13.5A5.5,5.5 0 0,1 13.5,19C12.28,19 11.15,18.6 10.24,17.93L17.93,10.24C18.6,11.15 19,12.28 19,13.5M14.6,20.08L17.37,18.93L17.13,22.28L14.6,20.08M18.93,17.38L20.08,14.61L22.28,17.15L18.93,17.38M20.08,12.42L18.94,9.64L22.28,9.88L20.08,12.42M9.63,18.93L12.4,20.08L9.87,22.27L9.63,18.93Z"/></svg>
        </button>
      </header>

      <div class="body">
        <!-- Editor area -->
        <main class="editor-area">
          <div class="tabbar" id="tabbar"></div>

          <!-- Find & replace panel -->
          <div class="find-panel" id="find-panel" hidden>
            <input id="find-input" placeholder="Find" />
            <input id="replace-input" placeholder="Replace" />
            <label><input type="checkbox" id="find-case" /> Aa</label>
            <label><input type="checkbox" id="find-word" /> Word</label>
            <button id="find-prev" class="icon-only" title="Previous">
              <svg class="icon" viewBox="0 0 24 24"><path d="M13,20H11V8L5.5,13.5L4.08,12.08L12,4.16L19.92,12.08L18.5,13.5L13,8V20Z"/></svg>
            </button>
            <button id="find-next" class="icon-only" title="Next">
              <svg class="icon" viewBox="0 0 24 24"><path d="M11,4H13V16L18.5,10.5L19.92,11.92L12,19.84L4.08,11.92L5.5,10.5L11,16V4Z"/></svg>
            </button>
            <button id="replace-one">Replace</button>
            <button id="replace-all">All</button>
            <span class="find-status" id="find-status"></span>
            <button id="find-close" class="icon-only find-close" title="Close">
              <svg class="icon" viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
            </button>
          </div>

          <div class="editor-wrap">
            <div class="gutter" id="gutter"></div>
            <textarea id="editor" spellcheck="false" wrap="off"></textarea>
          </div>
        </main>
      </div>

      <footer class="statusbar" id="statusbar">Ready</footer>
    </div>

    <script src="lineops.js"></script>
    <script src="main.js"></script>
  </body>
</html>
